# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
# Allow ServiceConfig beans to override auto-detected beans from infrastructure package
spring.main.allow-bean-definition-overriding=true
# ── Vaadin ────────────────────────────────────────────────────────────────────
# Development mode: shows component tree, live reload, etc.
# Switch to "production" before final submission (mvn vaadin:build-frontend)
vaadin.launch-browser=false
# ── Vaadin Push (real-time notifications) ─────────────────────────────────────
# Enables @Push on your MainLayout for server-side push (notification component)
vaadin.heartbeat-interval=300
# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.vaadin=INFO
spring.profiles.active=memory,user-db,suspension-db,lottery-db,company-db,event-db,prod,activeorder-db
spring.config.import=classpath:config.yml,optional:file:.env[.properties]

#  H2 (local/dev)
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console
#spring.datasource.url=jdbc:h2:mem:wsepdb
#spring.datasource.driverClassName=org.h2.Driver
#spring.datasource.username=a
#spring.datasource.password=a

#  PostgreSQL (GCP)
#  spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
